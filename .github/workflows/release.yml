name: リリース

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: write

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "1"
  DOTNET_NOLOGO: "1"

jobs:
  validate:
    name: バージョン検証とビルド
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    outputs:
      version: ${{ steps.parse.outputs.version }}
      is_prerelease: ${{ steps.parse.outputs.is_prerelease }}

    steps:
      - name: ソースコードを取得
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: タグからバージョン番号を抽出
        id: parse
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          if [[ "${VERSION}" == *"-"* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 抽出したバージョン番号を確認
        run: |
          echo "タグ        : ${{ github.ref_name }}"
          echo "バージョン  : ${{ steps.parse.outputs.version }}"
          echo "プレリリース: ${{ steps.parse.outputs.is_prerelease }}"

      - name: .NET SDK をセットアップ
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Unicode 17.0.0 の参照データを取得
        run: bash reference/build.sh

      - name: 依存パッケージを復元
        run: dotnet restore Uax14Net.slnx

      - name: ソリューションをビルド
        run: |
          dotnet build Uax14Net.slnx -c Release --no-restore \
            -p:Version=${{ steps.parse.outputs.version }}

      - name: 全テストを実行してリリース品質を確認
        run: |
          dotnet test Uax14Net.slnx -c Release --no-build \
            --logger "trx;LogFileName=results.trx" \
            --results-directory ./test-results

  pack:
    name: NuGet パッケージの作成
    runs-on: windows-latest
    needs: validate
    defaults:
      run:
        shell: bash

    steps:
      - name: ソースコードを取得
        uses: actions/checkout@v4

      - name: .NET SDK をセットアップ
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Unicode 17.0.0 の参照データを取得
        run: bash reference/build.sh

      - name: 依存パッケージを復元
        run: dotnet restore Uax14Net/Uax14Net.csproj

      - name: パッケージをビルド
        run: |
          dotnet build Uax14Net/Uax14Net.csproj -c Release --no-restore \
            -p:Version=${{ needs.validate.outputs.version }}

      - name: NuGet パッケージを作成
        run: |
          dotnet pack Uax14Net/Uax14Net.csproj -c Release --no-build \
            -p:Version=${{ needs.validate.outputs.version }} \
            --output ./artifacts

      - name: 作成されたパッケージ一覧を確認
        run: ls -la ./artifacts/

      - name: パッケージをアーティファクトとして保存
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: artifacts/
          retention-days: 90

  publish-nuget:
    name: NuGet.org へ公開
    runs-on: ubuntu-latest
    needs: [validate, pack]
    environment: nuget-release
    permissions:
      id-token: write
      packages: write
    defaults:
      run:
        shell: bash

    steps:
      - name: .NET SDK をセットアップ
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: パッケージをダウンロード
        uses: actions/download-artifact@v4
        with:
          name: nuget-packages
          path: ./artifacts

      - name: ダウンロードしたファイルを確認
        run: ls -la ./artifacts/

      - name: NuGet Trusted Publishing でログイン
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: routersys

      - name: NuGet.org へパッケージを発行
        run: |
          dotnet nuget push ./artifacts/Uax14Net.*.nupkg \
            --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: シンボルパッケージを発行
        run: |
          dotnet nuget push ./artifacts/Uax14Net.*.snupkg \
            --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
        continue-on-error: true

      - name: GitHub Packages へも発行
        run: |
          dotnet nuget push ./artifacts/Uax14Net.*.nupkg \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --source https://nuget.pkg.github.com/routersys/index.json \
            --skip-duplicate
        continue-on-error: true

  github-release:
    name: GitHub Release の作成
    runs-on: ubuntu-latest
    needs: [validate, pack, publish-nuget]
    defaults:
      run:
        shell: bash

    steps:
      - name: ソースコードを取得
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: パッケージをダウンロード
        uses: actions/download-artifact@v4
        with:
          name: nuget-packages
          path: ./artifacts

      - name: 直前のリリースタグを取得
        id: prev_tag
        run: |
          PREV=$(git tag --sort=-version:refname \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | sed -n '2p' || true)
          echo "tag=${PREV}" >> "$GITHUB_OUTPUT"

      - name: コミット履歴からリリースノートを生成
        id: changelog
        run: |
          PREV="${{ steps.prev_tag.outputs.tag }}"
          CURRENT="${{ github.ref_name }}"
          if [ -n "${PREV}" ]; then
            LOG=$(git log "${PREV}..${CURRENT}" --pretty=format:"- %s (%h)" --no-merges)
          else
            LOG=$(git log -n 30 --pretty=format:"- %s (%h)" --no-merges)
          fi
          {
            echo "notes<<NOTES_EOF"
            echo "### 変更内容"
            echo "${LOG:-変更履歴を取得できませんでした。}"
            echo ""
            echo "### インストール"
            echo '```sh'
            echo "dotnet add package Uax14Net --version ${{ needs.validate.outputs.version }}"
            echo '```'
            echo ""
            echo "### NuGet"
            echo "https://www.nuget.org/packages/Uax14Net/${{ needs.validate.outputs.version }}"
            echo "NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: GitHub Release を作成してパッケージを添付
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.notes }}
          prerelease: ${{ needs.validate.outputs.is_prerelease }}
          files: |
            artifacts/Uax14Net.*.nupkg
            artifacts/Uax14Net.*.snupkg
