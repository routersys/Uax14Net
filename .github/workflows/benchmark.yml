name: 性能計測

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      runs:
        description: "計測の実行回数"
        required: true
        type: string
        default: "20"
      commit_result:
        description: "計測結果を README へ反映してコミットする"
        required: true
        type: boolean
        default: true

permissions:
  contents: write

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "1"
  DOTNET_NOLOGO: "1"

jobs:
  benchmark:
    name: NativeAOT のスループットを計測
    runs-on: windows-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: ソースコードを取得
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: .NET SDK をセットアップ
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: NuGet パッケージをキャッシュ
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Build.props') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Unicode 17.0.0 の参照データを取得
        run: bash reference/build.sh

      - name: 実行例を NativeAOT で発行
        shell: cmd
        run: publish-aot.bat

      - name: 計測を実行して README を更新
        run: |
          AOT=$(find Uax14Net.Examples/bin -name Uax14Net.Examples.exe -path "*publish*" -print -quit)
          if [ -z "${AOT}" ]; then
            echo "NativeAOT の実行ファイルが見つかりません"
            exit 1
          fi
          echo "計測対象: ${AOT}"
          python .github/scripts/benchmark.py \
            --aot "${AOT}" \
            --runs "${{ inputs.runs || '20' }}" \
            --readme README.md \
            --readme-ja README.ja.md \
            --commit "${{ github.sha }}"

      - name: 計測結果をジョブ概要へ出力
        run: sed -n '/BENCHMARK:CI:BEGIN/,/BENCHMARK:CI:END/p' README.md >> "$GITHUB_STEP_SUMMARY"

      - name: 更新した README をアーティファクトとして保存
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-readme
          path: |
            README.md
            README.ja.md
          retention-days: 90

      - name: 計測結果を main へコミット
        if: ${{ github.event_name == 'release' || inputs.commit_result }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet README.md README.ja.md; then
            echo "計測結果に変化がないためコミットしません"
            exit 0
          fi
          git add README.md README.ja.md
          git commit -m "CIの計測結果で性能の節を更新"
          git push origin HEAD:main
