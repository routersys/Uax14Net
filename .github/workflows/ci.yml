name: CI

on:
  push:
    branches: ["main", "develop"]
    paths-ignore:
      - "*.md"
      - "docs/**"
  pull_request:
    branches: ["main"]
    paths-ignore:
      - "*.md"
      - "docs/**"

permissions:
  contents: read

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "1"
  DOTNET_NOLOGO: "1"

jobs:
  build:
    name: ビルドと適合検証
    runs-on: windows-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: ソースコードを取得
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: .NET SDK をセットアップ
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Unicode 17.0.0 の参照データを取得
        run: bash reference/build.sh

      - name: 取得した参照データを確認
        run: ls reference/data | wc -l

      - name: 依存パッケージを復元
        run: dotnet restore Uax14Net.slnx

      - name: ソリューションをビルド
        run: dotnet build Uax14Net.slnx -c Release --no-restore

      - name: テストを実行
        run: |
          dotnet test Uax14Net.slnx -c Release --no-build \
            --logger "trx;LogFileName=results.trx" \
            --results-directory ./test-results

      - name: テスト結果をアップロード
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7
          if-no-files-found: warn

      - name: パッケージが正常に作成されるか確認
        run: dotnet pack Uax14Net/Uax14Net.csproj -c Release --no-build

  publish-aot:
    name: NativeAOT 発行の確認
    runs-on: windows-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: ソースコードを取得
        uses: actions/checkout@v4

      - name: .NET SDK をセットアップ
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Unicode 17.0.0 の参照データを取得
        run: bash reference/build.sh

      - name: 実行例を NativeAOT で発行
        shell: cmd
        run: publish-aot.bat

      - name: 発行された実行ファイルを確認
        run: find Uax14Net.Examples/bin -name Uax14Net.Examples.exe -path "*publish*" -exec ls -la {} +

      - name: 発行された実行ファイルを走らせる
        shell: cmd
        run: Uax14Net.Examples\bin\Release\net10.0\win-x64\publish\Uax14Net.Examples.exe

  build-linux:
    name: Linux でのビルドと適合検証
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: ソースコードを取得
        uses: actions/checkout@v4

      - name: .NET SDK をセットアップ
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Unicode 17.0.0 の参照データを取得
        run: bash reference/build.sh

      - name: ライブラリをビルド
        run: dotnet build Uax14Net/Uax14Net.csproj -c Release

      - name: テストを実行
        run: dotnet test Uax14Net.Tests/Uax14Net.Tests.csproj -c Release
